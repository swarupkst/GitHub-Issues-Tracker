<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center">
    <section class="w-10/11 md:w-4/6 lg:w-1/3 bg-white mx-auto my-10 p-6 shadow-lg rounded-lg">
        <div>
            <div class="text-center space-y-1 md:space-y-3">
                <img class="mx-auto" src="./assets/github-logo.png" alt="Github logo">
                <h2 class="md:text-4xl text-xl font-bold">GitHub Issues Tracker</h2>
                <p>Sign in to manage your issues</p>
            </div>
           <div>
    <fieldset class="fieldset rounded-none w-full p-4">

        <label class="label font-bold text-black">Username</label>
        <input id="username" type="email" class="input w-full" placeholder="Enter Username" />
        <p class="text-[#4A00FF]">Default:admin</p>

        <label class="label font-bold text-black">Password</label>
        <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
        <p class="text-[#4A00FF]">Default:admin123</p>

        <button id="loginBtn" class="btn bg-blue-700 text-white mt-4">Login</button>

    </fieldset>
</div>
            <div class="flex items-center justify-center gap-3 px-4">
        <hr class="flex-grow border-gray-300">
        <p>OR</p>
        <hr class="flex-grow border-gray-300">
            </div>
         </div>

         <div>
            <p class="text-gray-500 text-center py-5">Demo Credentials:</p>
            <div class="text-center bg-gray-100 mx-5 p-4 rounded-lg">
                <p> <span>Username: </span> admin</p>
                <p> <span> Password: </span>admin123 </p>
            </div>
         </div>
    </section>
    <script src="./script.js"></script>
</body>
</html>
